{% set name = "sciluigi" %}
{% set version = "0.9.6b7" %}
{% set bundle = "tar.gz" %}
{% set hash = "201ba29b0260981955e94542dc66aa4321b14cff3132281209839e6c6486ff5a" %}
{% set build = 1 %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.{{ bundle }}
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.{{ bundle }}
  sha256: {{ hash }}

build:
  noarch: python
  number: {{ build }}
  script: python setup.py install --single-version-externally-managed --record=record.txt

requirements:
  host:
    - python {{ python_min }}
    - setuptools

  run:
    - python >={{ python_min }}
    - luigi

test:
  requires:
    - python {{ python_min }}
  imports:
    - sciluigi

about:
  home: https://github.com/pharmbio/sciluigi
  license_file: LICENSE
  license: MIT
  license_family: MIT
  summary: 'Helper library for writing dynamic, flexible workflows in luigi'
  dev_url: https://github.com/pharmbio/sciluigi
  doc_url: https://github.com/pharmbio/sciluigi

extra:
  recipe-maintainers:
    - pmlandwehr
